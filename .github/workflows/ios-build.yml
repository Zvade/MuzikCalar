name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build App via Swift Package
      run: |
        xcodebuild -buildwithpackage Package.swift -scheme MuzikCalar -configuration Release -sdk iphoneos -derivedDataPath buildData CODE_SIGNING_ALLOWED=NO
        mkdir -p build/Payload
        cp -R buildData/Build/Products/Release-iphoneos/MuzikCalar.app build/Payload/ 2>/dev/null || cp -R buildData/Build/Products/Release-iphoneos/MuzikCalar build/Payload/MuzikCalar.app || true
        cd build
        zip -r MuzikCalar.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MuzikCalar-App
        path: build/MuzikCalar.ipa
