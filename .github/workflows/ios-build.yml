name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # En kararlı macOS sürümü

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Swift Package for iOS
      run: |
        xcodebuild -buildwithpackage Package.swift -scheme MuzikCalar -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO
        mkdir -p build/Payload
        mv .build/plugins/outputs/MuzikCalar/*.app build/Payload/ 2>/dev/null || mv build/Build/Products/Release-iphoneos/*.app build/Payload/ 2>/dev/null || mkdir -p build/Payload && cp -R .build/*/*.bundle build/Payload/ 2>/dev/null || true
        cd build
        zip -r MuzikCalar.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MuzikCalar-App
        path: build/MuzikCalar.ipa
