name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

    - name: Build IPA
      run: |
        xcodebuild -project MuzikCalar.xcodeproj -scheme MuzikCalar -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO
        mkdir -p build/Payload
        mv build/Release-iphoneos/MuzikCalar.app build/Payload/ 2>/dev/null || mv build/Build/Products/Release-iphoneos/MuzikCalar.app build/Payload/ || true
        cd build
        zip -r MuzikCalar.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MuzikCalar-App
        path: build/MuzikCalar.ipa
