name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Xcode version
      run: sudo xcode-select -s /Applications/Xcode_14.3.1.app/Contents/Developer

    - name: Build IPA (Simulator / Ad-Hoc Style)
      run: |
        xcodebuild -project MuzikCalar.xcodeproj -scheme MuzikCalar -configuration Release -sdk iphoneos -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO
        mkdir -p build/Payload
        mv build/Release-iphoneos/MuzikCalar.app build/Payload/
        cd build
        zip -r MuzikCalar.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: MuzikCalar-App
        path: build/MuzikCalar.ipa
